{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Blogger</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="nav-container">
        <h2 class="logo">Blogger</h2>

        <div class="nav-links">
            <a href="{% url 'blog:home' %}">Home</a>
            <a href="{% url 'blog:create_post' %}" class="btn-primary">Create</a>
            
        </div>
    </div>

</header>

<!-- CONTENT -->
<main class="container">
    {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Blogger</p>
</footer>

</body>
</html>
