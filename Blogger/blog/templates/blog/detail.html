{% extends 'blog/base.html' %}

{% block content %}

<div class="card">
 <div class="detail-header">
        <a href="{% url 'blog:home' %}" class="btn-back">
            ← Back to Home
        </a>
    </div>
    
    <h2>{{ post.title }}</h2>

    <small>{{ post.published_at }}</small>

    {% if post.image %}
        <img src="{{ post.image.url }}" class="post-img">
    {% endif %}

    <p>{{ post.content }}</p>

    <div class="actions">

    <a href="{% url 'blog:edit_post' post.id %}" class="btn-edit">
     Edit
    </a>
        <a href="{% url 'blog:delete_post' post.id %}" 
       class="btn-delete"
       onclick="return confirm('Are you sure you want to delete this post?')">
         Delete
    </a>
    </div>

</div>

{% endblock %}
