{% extends 'blog/base.html' %}

{% block content %}

<div class="home-header">
    <h2>Latest Posts</h2>

    <a href="{% url 'blog:create_post' %}" class="btn-primary">
        + New Post
    </a>
</div>

{% for post in posts %}
<div class="card">
    <h3>{{ post.title }}</h3>
    <p>{{ post.content }}</p>
    <small>{{ post.published_at }}</small>
</div>
{% empty %}
<p>No posts yet</p>
{% endfor %}

{% endblock %}
